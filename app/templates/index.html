<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local-first Multi Agent Meeting Room</p>
          <h1>Agent Meeting Room</h1>
        </div>
        <div class="topbar-actions">
          <button id="settings-toggle" class="ghost">設定</button>
          <button id="new-meeting-toggle" class="primary">新會議</button>
        </div>
      </header>

      <main class="meeting-layout">
        <section class="meeting-main">
          <div class="meeting-meta">
            <div>
              <span class="meta-label">目前會議</span>
              <h2 id="meeting-title">尚未建立會議</h2>
              <p id="meeting-objective" class="muted">請先建立一場新會議。</p>
            </div>
            <div class="status-pill-group">
              <span class="status-pill" id="meeting-status">待命</span>
              <span class="status-pill secondary" id="meeting-round">Round 0</span>
            </div>
          </div>

          <section class="conversation-surface">
            <div id="conversation-list" class="conversation-list empty">
              建立會議後，這裡會顯示使用者與各個 agent 的逐輪討論。
            </div>
          </section>

          <section class="composer-bar">
            <div class="composer-grid">
              <label class="composer-field">
                <span>正式會議輸入</span>
                <textarea id="round-input" rows="3" placeholder="輸入這一輪要討論的問題、補充背景或你想回應的內容"></textarea>
              </label>
              <label class="composer-field">
                <span>使用者插話 / 補充</span>
                <textarea id="note-input" rows="3" placeholder="輸入想補充給下一輪或想讓大家納入討論的內容"></textarea>
              </label>
            </div>
            <div class="composer-actions">
              <button id="run-round-button" class="primary" disabled>開始下一輪</button>
              <button id="close-meeting-button" class="ghost" disabled>結束會議</button>
              <button id="export-text-button" class="ghost" disabled>匯出文字</button>
              <button id="export-python-button" class="ghost" disabled>匯出 Python</button>
            </div>
          </section>
        </section>

        <aside class="meeting-sidebar">
          <section class="panel">
            <div class="panel-head">
              <h3>與會 Agent</h3>
              <p>綠燈代表席位啟用，亮起代表目前發話角色。</p>
            </div>
            <div id="agent-list" class="agent-list empty">尚未建立會議。</div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>暫存記憶</h3>
              <p>開會中暫存，會後匯出才進入長期記憶。</p>
            </div>
            <div id="memory-preview" class="memory-preview empty">尚無暫存記憶。</div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>長期記憶</h3>
              <p>匯出並存檔後留下的歷史紀錄。</p>
            </div>
            <div id="archive-list" class="archive-list empty">尚未存入長期記憶。</div>
          </section>
        </aside>
      </main>

      <div id="settings-drawer" class="drawer hidden">
        <div class="drawer-panel">
          <div class="drawer-head">
            <h2>設定</h2>
            <button id="settings-close" class="ghost">關閉</button>
          </div>

          <section class="drawer-section">
            <h3>API 與模型</h3>
            <form id="settings-form" class="stack">
              <label>
                API 模式
                <select name="api_mode" id="settings-api-mode">
                  <option value="mock">mock</option>
                  <option value="openai_compatible">openai_compatible</option>
                </select>
              </label>
              <label>
                API Key
                <input type="password" name="api_key" id="settings-api-key" />
              </label>
              <label>
                Base URL
                <input type="text" name="base_url" id="settings-base-url" />
              </label>
              <label>
                模型名稱
                <input type="text" name="model_name" id="settings-model-name" />
              </label>
              <label>
                Temperature
                <input type="number" step="0.1" min="0" max="2" name="temperature" id="settings-temperature" />
              </label>
              <label>
                Max Tokens
                <input type="number" min="64" max="4000" name="max_tokens" id="settings-max-tokens" />
              </label>
              <label>
                OpenClaw Gateway URL
                <input type="text" name="openclaw_gateway_url" id="settings-openclaw-url" placeholder="本版先保留欄位" />
              </label>
              <label>
                OpenClaw 備註
                <textarea name="openclaw_notes" id="settings-openclaw-notes" rows="2" placeholder="記錄未來要接的 agent 或 gateway 資訊"></textarea>
              </label>
              <button type="submit" class="primary">儲存設定</button>
            </form>
          </section>

          <section class="drawer-section">
            <div class="section-head">
              <h3>角色設定</h3>
              <button id="add-role-button" class="ghost">新增自訂角色</button>
            </div>
            <div id="role-editor-list" class="role-editor-list"></div>
          </section>
        </div>
      </div>

      <div id="meeting-modal" class="drawer hidden">
        <div class="drawer-panel meeting-panel">
          <div class="drawer-head">
            <h2>建立新會議</h2>
            <button id="meeting-close" class="ghost">關閉</button>
          </div>
          <form id="meeting-form" class="stack">
            <label>
              會議標題
              <input type="text" name="title" placeholder="例如：產品首頁重新設計會議" required />
            </label>
            <label>
              會議目標
              <input type="text" name="objective" placeholder="例如：收斂一版可執行的前端改版方向" />
            </label>
            <label>
              背景說明
              <textarea name="context_text" rows="4" placeholder="輸入背景、限制條件、已知資訊"></textarea>
            </label>
            <fieldset class="role-picker">
              <legend>選擇與會角色</legend>
              <div id="meeting-role-picker" class="role-picker-grid"></div>
            </fieldset>
            <button type="submit" class="primary">建立會議</button>
          </form>
        </div>
      </div>

      <template id="role-editor-template">
        <article class="role-editor-card">
          <div class="role-editor-title">
            <div>
              <strong data-role-name></strong>
              <span data-role-type class="role-source-tag"></span>
            </div>
            <label class="toggle">
              <input type="checkbox" data-role-enabled />
              <span>啟用</span>
            </label>
          </div>
          <label>
            名稱
            <input type="text" data-role-field="display_name" />
          </label>
          <label>
            定位
            <input type="text" data-role-field="description" />
          </label>
          <label>
            系統提示詞
            <textarea rows="5" data-role-field="system_prompt"></textarea>
          </label>
          <label>
            顏色
            <input type="color" data-role-field="color" />
          </label>
          <button data-role-save class="ghost">儲存角色</button>
        </article>
      </template>

      <script src="{{ url_for('static', path='app.js') }}"></script>
    </div>
  </body>
</html>
